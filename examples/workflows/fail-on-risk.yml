# ai-surface PR check that BLOCKS merges if any risk indicator fires.
#
# Combine this with a branch protection rule on main (Require status checks
# to pass before merging) for hard enforcement.

name: AI Surface Check (Blocking)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: apisec-inc/AI-Surface@v0
        with:
          path: '.'
          comment-on-pr: 'true'
          fail-on-risk: 'true'    # exits non-zero if any risk indicator is flagged
