apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-embeddings
  namespace: ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-embeddings
  template:
    metadata:
      labels:
        app: vllm-embeddings
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "intfloat/e5-mistral-7b-instruct"
          ports:
            - containerPort: 8000
