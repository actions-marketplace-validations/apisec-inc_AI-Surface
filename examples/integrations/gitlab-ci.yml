# GitLab CI equivalent of the ai-surface PR check.
#
# Runs on merge requests. Captures the JSON report as an artifact and writes
# the diff markdown to the MR description (or posts as a note via the API).
#
# Note: native GitLab CI component planned for ai-surface v0.6.

ai-surface:
  image: python:3.11-slim
  stage: test
  only:
    - merge_requests
  before_script:
    - pip install git+https://github.com/apisec-inc/AI-Surface@v0.5.3
  script:
    # Scan the head of the MR branch
    - ai-surface scan . --output json > head.json

    # Scan the target branch
    - git fetch origin $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - git checkout origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - ai-surface scan . --output json > base.json

    # Compare
    - git checkout $CI_COMMIT_SHA
    - ai-surface compare base.json head.json > diff.md

    # Post the diff as an MR note via the GitLab API
    - |
      curl --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --data-urlencode "body=$(cat diff.md)" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
  artifacts:
    paths:
      - head.json
      - diff.md
    expire_in: 30 days
