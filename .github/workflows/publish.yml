# Publish to PyPI.
#
# Currently MANUAL ONLY. Trigger this workflow by hand from the Actions tab
# when we are ready to publish a version of ai-surface to PyPI. PyPI
# publication is deferred until v1.0; until then the project is installable
# from source (pip install git+https://github.com/apisec-inc/AI-Surface@vX.Y.Z).
# Deferring PyPI also defers the schema-stability promise that PyPI listing
# implies for a Python package.
#
# Tag format when we do publish: v0.5.0, v1.0.0, etc.
# Uses PyPI Trusted Publisher (OIDC), no API token stored in secrets.
# Configure the trusted publisher at https://pypi.org/manage/account/publishing/
# before the first manual run.

name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-surface
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
