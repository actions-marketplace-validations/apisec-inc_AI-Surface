openapi: 3.0.3
info:
  title: Orders API
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
paths:
  /v1/orders:
    get:
      summary: List orders
      responses:
        '200':
          description: ok
    post:
      summary: Create order
      responses:
        '201':
          description: created
  /v1/orders/{id}/refund:
    post:
      summary: Refund an order
      responses:
        '200':
          description: ok
  /healthz:
    get:
      summary: Liveness
      responses:
        '200':
          description: ok
